<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Sinhala:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="./site-content.js"></script>
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;scroll-padding-top:82px;}
  body{margin:0;background:#0A0A0C;color:#F5F5F7;font-family:'Noto Sans','Noto Sans Sinhala',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  ::selection{background:#FBD20A;color:#2A0512;}
  a{color:inherit;}
  img{max-width:100%;}
  .pa-hero-img,.pa-cta-img{position:relative;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;}
  .pa-hero-img{margin:52px auto 0;max-width:380px;}
  .pa-cta-img{margin:44px auto 0;width:min(72vw,300px);}
  @media(min-width:1020px){
    .pa-hero{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:clamp(28px,4vw,64px);align-items:end;max-width:1120px !important;text-align:left !important;}
    .pa-hero-row{justify-content:flex-start !important;}
    .pa-hero-sub{margin-left:0 !important;}
    .pa-hero-img{margin:0 !important;max-width:none;}
  }
  @media(min-width:1000px){
    .pa-cta{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:clamp(28px,4vw,56px);align-items:end;max-width:980px !important;text-align:left !important;}
    .pa-cta-img{margin:0 0 6px !important;width:100%;}
    .pa-cta-sub{margin-left:0 !important;margin-right:0 !important;}
    .pa-cta-closed{align-items:flex-start !important;}
  }
  @media(min-width:980px){
    .pa-sol{grid-template-columns:minmax(0,1fr) 280px !important;gap:clamp(24px,4vw,56px);align-items:end;}
    .pa-sol-img{margin-top:0 !important;}
  }
  @media(max-width:430px){
    .pa-hero-row a,.pa-cta a,.pa-reg-off{width:100%;}
  }
  @media(max-width:1019px){
    .pa-hero h1 br{display:none;}
  }
  @media(max-width:700px){
    .pa-included-scroll{max-height:none !important;overflow-y:visible !important;padding-right:2px !important;}
  }
  @media(min-width:860px){
    .pa-who{grid-template-columns:1fr 300px !important;gap:clamp(24px,4vw,52px) !important;align-items:end;}
    .pa-who-img{margin-top:0 !important;}
  }
  @media(min-width:900px){
    .pa-navlinks{display:flex !important;}
    .pa-navcta{display:inline-flex !important;}
    .pa-burger{display:none !important;}
    .pa-mobilemenu{display:none !important;}
  }
  .pa-navlink:hover{background:rgba(251,210,10,.15);color:#FBD20A !important;}
  .pa-ghost{transition:transform .28s cubic-bezier(.2,.7,.2,1),box-shadow .28s ease,border-color .28s ease,background .28s ease,color .28s ease;}
  .pa-ghost:hover{transform:translateY(-2px) scale(1.015);border-color:rgba(251,210,10,.6) !important;background:rgba(251,210,10,.09) !important;color:#FBD20A !important;box-shadow:0 18px 44px -14px rgba(251,210,10,.4);}
  .pa-included-scroll::-webkit-scrollbar{width:8px;}
  .pa-included-scroll::-webkit-scrollbar-thumb{background:rgba(251,210,10,.35);border-radius:99px;}
  .pa-included-scroll::-webkit-scrollbar-track{background:rgba(245,245,247,.05);border-radius:99px;}
  [style*="253, 226, 92"]{position:relative;overflow:hidden;transition:transform .28s cubic-bezier(.2,.7,.2,1),box-shadow .28s ease,filter .28s ease;}
  [style*="253, 226, 92"]:hover{transform:translateY(-2px) scale(1.015);box-shadow:0 22px 52px -12px rgba(251,210,10,.72);filter:brightness(1.06);}
  [style*="253, 226, 92"]::after{content:"";position:absolute;top:0;bottom:0;left:-75%;width:55%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-18deg);transition:left .6s ease;pointer-events:none;}
  [style*="253, 226, 92"]:hover::after{left:145%;}
  .pa-card{transition:transform .3s cubic-bezier(.2,.7,.2,1),box-shadow .3s ease,border-color .3s ease;}
  .pa-card:hover{transform:translateY(-5px) scale(1.02) !important;border-color:rgba(251,210,10,.42) !important;box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 28px 56px -24px rgba(0,0,0,.95),0 0 40px -12px rgba(251,210,10,.32) !important;}
</style>
</helmet>

<div style="position:relative;">

  <dc-import name="Nav" home-href="#home" register-href="Application Guide.dc.html#apply" show-countdown="true" hint-size="100%,64px"></dc-import>


  <dc-import name="Home 01 - Hero" hint-size="100%,880px"></dc-import>
  <dc-import name="Home 02 - The Problem" hint-size="100%,600px"></dc-import>
  <dc-import name="Home 03 - The Solution" hint-size="100%,600px"></dc-import>

  <dc-import name="Home 05 - What You Will Learn" hint-size="100%,980px"></dc-import>
  <dc-import name="Home 06 - What Is Included" hint-size="100%,600px"></dc-import>
  <dc-import name="Home 07 - Who Is This For" hint-size="100%,600px"></dc-import>
  <dc-import name="Home 08 - Testimonials" hint-size="100%,900px"></dc-import>
  <dc-import name="Home 09 - Pricing" hint-size="100%,1100px"></dc-import>
  <dc-import name="Home 10 - Guarantee" hint-size="100%,600px"></dc-import>
  <dc-import name="Home 11 - FAQ" hint-size="100%,900px"></dc-import>
  <dc-import name="Home 12 - Final CTA" hint-size="100%,600px"></dc-import>

  <dc-import name="Footer" hint-size="100%,360px"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script></script>
</body>
</html>
