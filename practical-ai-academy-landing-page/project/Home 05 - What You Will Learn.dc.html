<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<script src="./site-content.js"></script>
</helmet>
  <!-- ================= CURRICULUM ================= -->
  <section id="curriculum" style="max-width:1140px;margin:0 auto;padding:60px 20px;">
    <div style="text-align:center;max-width:640px;margin:0 auto;">
      <div style="color:#FBD20A;font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;">What You Will Learn</div>
      <h2 style="font-size:clamp(27px,6vw,42px);font-weight:900;line-height:1.26;letter-spacing:-.5px;margin:14px 0 0;">සති 10යි, ජීවිත කාලෙටම ඔයා ගාව තියෙන වටිනා Skills Set එකයි.</h2>
      <p style="color:rgba(245,245,247,.96);font-size:clamp(17px,4vw,21px);line-height:1.8;margin:16px auto 0;">ඔයාගේ පළවෙනි Prompt එකේ ඉඳන්, ඔයාගේම සම්පූර්ණ AI System එක හදාගන්නකල් පැහැදිලි ගමනක්.</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:16px;margin-top:38px;">
      <sc-for list="{{ weeks }}" as="w" hint-placeholder-count="10">
        <div class="pa-card" style="position:relative;overflow:hidden;background:linear-gradient(155deg,rgba(101,10,52,.20),rgba(133,0,0,.09) 45%,rgba(12,12,15,.55));border:1px solid rgba(245,245,247,.17);border-radius:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -1px 1px rgba(0,0,0,.3),0 22px 46px -30px rgba(0,0,0,.9);padding:22px 20px;">
          <div style="position:absolute;right:14px;top:6px;font-size:48px;font-weight:900;color:rgba(251,210,10,.12);line-height:1;letter-spacing:-2px;">{{ w.n }}</div>
          <div style="position:relative;font-size:12px;font-weight:800;letter-spacing:2px;color:#FBD20A;text-transform:uppercase;">Week {{ w.n }}</div>
          <h3 style="position:relative;margin:9px 0 9px;font-size:19.5px;font-weight:800;line-height:1.32;">{{ w.title }}</h3>
          <p style="position:relative;margin:0;font-size:15.5px;line-height:1.7;color:rgba(245,245,247,.96);">{{ w.line }}</p>
        </div>
      </sc-for>
    </div>
  </section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    this.__pc = window.PA_CONTENT;
    this._poll = setInterval(() => {
      if (window.PA_CONTENT !== this.__pc) { this.__pc = window.PA_CONTENT; this.forceUpdate(); }
    }, 500);
    this._pollEnd = setTimeout(() => clearInterval(this._poll), 15000);
  }
  componentWillUnmount() { if (this._poll) clearInterval(this._poll); if (this._pollEnd) clearTimeout(this._pollEnd); }
  renderVals() {
    // The week cards are edited in site-content.js (weeks list)
    const C = window.PA_CONTENT || {};
    return { weeks: C.weeks || [] };
  }
}
</script>
</body>
</html>
