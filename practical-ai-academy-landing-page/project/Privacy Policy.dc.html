<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Sinhala:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#0A0A0C;color:#F5F5F7;font-family:'Noto Sans','Noto Sans Sinhala',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  ::selection{background:#FBD20A;color:#2A0512;}
  a{color:inherit;}
</style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;">
  <dc-import name="Nav" home-href="Practical AI Academy.dc.html#home" register-href="Application Guide.dc.html#apply" hint-size="100%,64px"></dc-import>

  <main style="flex:1;position:relative;overflow:hidden;padding:clamp(16px,4vw,56px) 20px 72px;">
    <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(70% 30% at 50% 0%,rgba(133,0,0,.36),transparent 68%);"></div>
    <div style="position:relative;max-width:780px;margin:0 auto;">
      <div style="color:#FBD20A;font-size:12.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;">Legal</div>
      <h1 style="margin:12px 0 0;font-size:clamp(30px,7vw,46px);font-weight:900;line-height:1.1;letter-spacing:-.8px;">Privacy Policy</h1>
      <p style="margin:12px 0 0;font-size:14px;color:rgba(245,245,247,.5);">Last updated: {{ updated }}</p>

      <div style="margin-top:34px;display:flex;flex-direction:column;gap:30px;">
        <sc-for list="{{ sections }}" as="s" hint-placeholder-count="9">
          <div>
            <h2 style="margin:0 0 10px;font-size:clamp(19px,4.4vw,23px);font-weight:800;color:#F5F5F7;">{{ s.h }}</h2>
            <p style="margin:0;font-size:clamp(15px,3.6vw,16.5px);line-height:1.72;color:rgba(245,245,247,.68);">{{ s.p }}</p>
          </div>
        </sc-for>
      </div>
    </div>
  </main>

  <dc-import name="Footer" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      updated: '8 July 2026',
      sections: [
        { h: '1. Information We Collect', p: 'When you apply for a course, book a consultation, or contact us, we may collect your name, date of birth, mobile and WhatsApp numbers, email address, your answers to our application questions, payment confirmation details, and basic website usage data. We do not store your full card details, since payments are processed by our payment provider or through bank transfer.' },
        { h: '2. How We Use Your Information', p: 'We use your information to review your application, communicate with you about your enrollment, consultation, or purchase, deliver course access and materials, and add you to the relevant WhatsApp community. We will only send you updates about future AIYUBOVAN courses if you have agreed to this on our application form.' },
        { h: '3. Legal Basis for Processing', p: 'We process your personal data based on your consent, such as when you submit an application or agree to receive updates, and where necessary to deliver a course, consultation, or product you have paid for.' },
        { h: '4. Third Party Services We Use', p: 'To operate our services, we share limited data with trusted third party providers, including Tally for application forms, Cal.com for consultation scheduling, Supabase for securely storing website content, WhatsApp for community communication, and Google Meet for live sessions, along with our payment providers. We do not sell your personal information to anyone.' },
        { h: '5. Data Retention', p: 'We keep your personal information for as long as needed to deliver our services, or as required by law. If you would like your data deleted sooner, please contact us.' },
        { h: '6. Your Rights', p: 'You have the right to request access to the personal data we hold about you, ask us to correct inaccurate data, request deletion of your data where possible, and withdraw your consent to marketing updates at any time. To do any of this, email info@aiyubovan.com.' },
        { h: '7. Cookies and Analytics', p: 'Our website may use basic cookies and analytics to understand how visitors use our site and to improve it. You can manage cookies through your browser settings.' },
        { h: '8. International Data Transfers', p: 'Some of the third party services we use may process or store data outside Sri Lanka. Where this happens, we take reasonable steps to keep your data protected in line with this policy.' },
        { h: '9. Children\'s Privacy', p: 'Our services are not directed at children under 18, and we do not knowingly collect personal data from children.' },
        { h: '10. Data Security', p: 'We take reasonable steps to protect your personal data from unauthorized access, loss, or misuse, although no method of sending information over the internet is completely secure.' },
        { h: '11. Changes to This Policy', p: 'We may update this privacy policy from time to time. The latest version will always be available on this page.' },
        { h: '12. Contact', p: 'For any privacy related questions or requests, please reach out to info@aiyubovan.com.' },
      ],
    };
  }
}
</script>
</body>
</html>
