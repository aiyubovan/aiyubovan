<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Sinhala:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#0A0A0C;color:#F5F5F7;font-family:'Noto Sans','Noto Sans Sinhala',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  ::selection{background:#FBD20A;color:#2A0512;}
  a{color:inherit;}
</style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;">
  <dc-import name="Nav" home-href="Practical AI Academy.dc.html#home" register-href="Application Guide.dc.html#apply" hint-size="100%,64px"></dc-import>

  <main style="flex:1;position:relative;overflow:hidden;padding:clamp(16px,4vw,56px) 20px 72px;">
    <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(70% 30% at 50% 0%,rgba(133,0,0,.36),transparent 68%);"></div>
    <div style="position:relative;max-width:780px;margin:0 auto;">
      <div style="color:#FBD20A;font-size:12.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;">Legal</div>
      <h1 style="margin:12px 0 0;font-size:clamp(30px,7vw,46px);font-weight:900;line-height:1.1;letter-spacing:-.8px;">Privacy Policy</h1>
      <p style="margin:12px 0 0;font-size:14px;color:rgba(245,245,247,.5);">Last updated: {{ updated }}</p>
      <div style="margin:20px 0 0;background:linear-gradient(155deg,rgba(101,10,52,.18),rgba(12,12,15,.5));border:1px solid rgba(245,245,247,.14);border-radius:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);padding:16px 18px;font-size:14px;line-height:1.6;color:rgba(245,245,247,.6);">This is placeholder text so you can see the layout. Please replace each section with your finalized wording before going live.</div>

      <div style="margin-top:34px;display:flex;flex-direction:column;gap:30px;">
        <sc-for list="{{ sections }}" as="s" hint-placeholder-count="9">
          <div>
            <h2 style="margin:0 0 10px;font-size:clamp(19px,4.4vw,23px);font-weight:800;color:#F5F5F7;">{{ s.h }}</h2>
            <p style="margin:0;font-size:clamp(15px,3.6vw,16.5px);line-height:1.72;color:rgba(245,245,247,.68);">{{ s.p }}</p>
          </div>
        </sc-for>
      </div>
    </div>
  </main>

  <dc-import name="Footer" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      updated: '1 July 2026',
      sections: [
        { h: '1. Information We Collect', p: 'When you register, we collect details such as your name, email, phone number and payment confirmation. We only collect what we need to run the course. Placeholder text.' },
        { h: '2. How We Use Your Information', p: 'We use your information to give you access to classes, send notes and recordings, and keep you updated about the course. Placeholder text, replace with your final wording.' },
        { h: '3. Payment Information', p: 'Payments are processed by trusted providers and through bank transfer. We do not store your full card details on our systems. Placeholder text.' },
        { h: '4. Cookies and Analytics', p: 'Our website may use basic cookies and analytics to understand how visitors use the page and to improve it. Placeholder text.' },
        { h: '5. Sharing Your Information', p: 'We do not sell your personal information. We only share it with services that help us deliver the course, such as our class platform. Placeholder text.' },
        { h: '6. Data Security', p: 'We take reasonable steps to keep your information safe. No system is perfect, but we work to protect your data. Placeholder text.' },
        { h: '7. Your Rights', p: 'You can ask us to view, correct or delete the personal information we hold about you at any time. Placeholder text.' },
        { h: '8. Third Party Services', p: 'We use tools such as Zoom, WhatsApp and email providers. Their own privacy policies also apply when you use them. Placeholder text.' },
        { h: '9. Changes to This Policy', p: 'We may update this policy from time to time. The latest version will always be available on this page. Placeholder text.' },
        { h: '10. Contact', p: 'For any questions about your privacy, please reach out through the contact details on our main page. Placeholder text.' },
      ],
    };
  }
}
</script>
</body>
</html>
