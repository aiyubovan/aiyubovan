<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<script src="./site-content.js"></script>
</helmet>
  <!-- ============ FAQ ============ -->
  <section style="max-width:820px;margin:0 auto;padding:44px 22px;">
    <h2 style="margin:0 0 30px;font-size:clamp(26px,6vw,38px);font-weight:800;line-height:1.22;letter-spacing:-.3px;text-align:center;">❓ නිතර අහන ප්‍රශ්න</h2>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <sc-for list="{{ faqs }}" as="f" hint-placeholder-count="6">
        <div style="background:linear-gradient(155deg,rgba(101,10,52,.16),rgba(12,12,15,.5));border:1px solid rgba(245,245,247,.13);border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06);padding:22px 22px;"><div style="font-size:18px;font-weight:800;color:#FBD20A;margin-bottom:8px;">{{ f.q }}</div><p style="margin:0;font-size:16.5px;line-height:1.8;color:rgba(245,245,247,.96);">{{ f.a }}</p></div>
      </sc-for>
    </div>
  </section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    this.__pc = window.PA_CONTENT;
    this._poll = setInterval(() => {
      if (window.PA_CONTENT !== this.__pc) { this.__pc = window.PA_CONTENT; this.forceUpdate(); }
    }, 500);
    this._pollEnd = setTimeout(() => clearInterval(this._poll), 15000);
  }
  componentWillUnmount() { if (this._poll) clearInterval(this._poll); if (this._pollEnd) clearTimeout(this._pollEnd); }
  renderVals() {
    // FAQs for this page come from the admin panel (faqs table, page='learn').
    // Prices are managed from the admin panel (site_settings); {price} inside
    // any answer is swapped for the live course price.
    const C = window.PA_CONTENT || {};
    const S = C.settings || {};
    const fmt = (n) => Number(n || 0).toLocaleString('en-US');
    const price = fmt(S.coursePrice || 9900);
    const faqs = (C.faqsLearn || []).map((f) => ({
      q: f.q,
      a: String(f.a || '').split('{price}').join(price),
    }));
    return { faqs, coursePrice: price, courseValue: fmt(S.courseValue || 45000) };
  }
}
</script>
</body>
</html>
