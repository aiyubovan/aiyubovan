<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<script src="./site-content.js"></script>
</helmet>
  <!-- ================= INCLUDED ================= -->
  <section style="max-width:1140px;margin:0 auto;padding:56px 20px;">
    <div style="text-align:center;max-width:640px;margin:0 auto;">
      <div style="color:#FBD20A;font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;">What Is Included</div>
      <h2 style="font-size:clamp(27px,6vw,42px);font-weight:900;line-height:1.26;letter-spacing:-.5px;margin:14px 0 0;">නිකන්ම Class එකක් නෙමෙයි! ජීවිත කාලෙටම වටින Toolkit එකක්.</h2>
    </div>
    <div class="pa-included-scroll" style="max-height:680px;overflow-y:auto;overscroll-behavior:contain;margin-top:36px;padding:2px 8px 2px 2px;scrollbar-width:thin;scrollbar-color:rgba(251,210,10,.45) rgba(245,245,247,.06);">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;">
      <sc-for list="{{ included }}" as="item" hint-placeholder-count="7">
        <div class="pa-card" style="display:flex;align-items:flex-start;gap:14px;background:linear-gradient(155deg,rgba(101,10,52,.18),rgba(12,12,15,.5));border:1px solid rgba(245,245,247,.17);border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),inset 0 -1px 1px rgba(0,0,0,.26);padding:18px 18px;">
          <span style="flex:none;width:26px;height:26px;border-radius:50%;background:rgba(251,210,10,.12);border:1px solid rgba(251,210,10,.35);display:flex;align-items:center;justify-content:center;margin-top:1px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FBD20A" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
          <span style="font-size:16.5px;font-weight:600;line-height:1.65;color:rgba(245,245,247,.95);">{{ item }}</span>
        </div>
      </sc-for>
    </div>
    </div>
  </section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    if (!window.PA_CONTENT) this._t = setTimeout(() => this.forceUpdate(), 400);
  }
  componentWillUnmount() { if (this._t) clearTimeout(this._t); }
  renderVals() {
    // The checklist items are edited in site-content.js (included list)
    const C = window.PA_CONTENT || {};
    return { included: C.included || [] };
  }
}
</script>
</body>
</html>
