<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<script src="./site-content.js"></script>
</helmet>
  <!-- ================= FINAL CTA ================= -->
  <section style="position:relative;overflow:hidden;padding:80px 20px 90px;">
    <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(60% 70% at 50% 50%,rgba(101,10,52,.55),transparent 72%),radial-gradient(40% 50% at 78% 20%,rgba(133,0,0,.35),transparent 70%);"></div>
    <div class="pa-cta" style="position:relative;max-width:720px;margin:0 auto;text-align:center;">
    <div>
      <h2 style="margin:0;font-size:clamp(30px,7vw,50px);font-weight:900;line-height:1.3;letter-spacing:-.5px;">වැඩ කරන එක තවත් ලේසි කරන, වේගවත් කරන ඔයාගේ අලුත් ගමන <span style="color:#FBD20A;">අදම පටන් ගනිමු.</span></h2>
      <p class="pa-cta-sub" style="margin:20px auto 0;max-width:580px;font-size:clamp(18px,4.4vw,22px);line-height:1.8;color:rgba(245,245,247,.9);">ඔයාට ඇත්තටම තේරෙන භාෂාවෙන්ම AI වලින් ඔයාගේ වැඩ කරගන්න හැටි ඉගෙන ගන්න ඕන නම්, තවත් හිත හිත ඉන්න එපා, අදම Practical AI Academy එකට එකතු වෙන්න!</p>
      <sc-if value="{{ regOpen }}" hint-placeholder-val="{{ true }}">
        <a href="Application Guide.dc.html#apply" style="display:inline-flex;align-items:center;justify-content:center;margin-top:30px;background:linear-gradient(180deg,#FDE25C,#FBD20A);color:#2A0512;font-weight:800;font-size:18px;border-radius:999px;padding:18px 38px;text-decoration:none;box-shadow:0 16px 40px -12px rgba(251,210,10,.6);">දැන්ම ලියාපදිංචි වන්න</a>
      </sc-if>
      <sc-if value="{{ regClosed }}">
        <div class="pa-cta-closed" style="display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:30px;">
          <span class="pa-reg-off" style="display:inline-flex;align-items:center;justify-content:center;background:rgba(245,245,247,.06);color:rgba(245,245,247,.5);font-weight:800;font-size:18px;border:1px solid rgba(245,245,247,.14);border-radius:999px;padding:18px 38px;cursor:not-allowed;">ලියාපදිංචිය දැන් වසා ඇත</span>
          <span style="display:inline-flex;align-items:center;gap:9px;background:rgba(240,64,60,.10);border:1px solid rgba(240,64,60,.45);border-radius:999px;padding:9px 18px;font-size:14.5px;font-weight:700;color:#FF7B72;">
            <span style="width:7px;height:7px;border-radius:50%;background:#FF5A52;box-shadow:0 0 10px rgba(255,90,82,.9);"></span>
            ඊළඟ කණ්ඩායම පටන් ගන්නේ: {{ nextBatch }}
          </span>
        </div>
      </sc-if>
    </div>
    <div class="pa-cta-img">
      <div style="position:relative;width:100%;aspect-ratio:1;">
        <div style="position:absolute;inset:-14%;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(251,210,10,.22),rgba(133,0,0,.20) 55%,transparent 74%);"></div>
        <div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;border:1px solid rgba(251,210,10,.36);background:radial-gradient(circle at 50% 30%,rgba(101,10,52,.5),rgba(12,12,15,.25) 76%);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 26px 60px -28px rgba(0,0,0,.9);">
          <img src="assets/ruwantha-cheer.webp" loading="lazy" decoding="async" alt="Ruwantha celebrating" style="position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:96%;max-width:none;">
        </div>
      </div>
    </div>
    </div>
    </div>
  </section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    // site-content.js may finish loading just after first render
    this.__pc = window.PA_CONTENT;
    this._poll = setInterval(() => {
      if (window.PA_CONTENT !== this.__pc) { this.__pc = window.PA_CONTENT; this.forceUpdate(); }
    }, 500);
    this._pollEnd = setTimeout(() => clearInterval(this._poll), 15000);
  }
  componentWillUnmount() { if (this._poll) clearInterval(this._poll); if (this._pollEnd) clearTimeout(this._pollEnd); }
  renderVals() {
    const S = (window.PA_CONTENT && window.PA_CONTENT.settings) || {};
    const regOpen = S.registrationOpen !== false;
    return { regOpen, regClosed: !regOpen, nextBatch: S.nextBatchDate || '' };
  }
}
</script>
</body>
</html>
